# Publishes this n8n community node package to npm on every version tag push.
#
# n8n Creator Portal verification requires GitHub Actions publishing with
# npm provenance for nodes submitted from May 1, 2026 onward.
#
# One-time setup:
# 1. Preferred: configure npm Trusted Publishing for:
#    - Repository owner: HustleOps
#    - Repository name: hustleops-n8n-plugin
#    - Workflow name: publish.yml
# 2. Fallback: set an NPM_TOKEN GitHub Actions secret with package publish rights.
#
# Release flow:
# - Run `npm run release` locally from a clean main branch.
# - The local command bumps version, commits, tags, and pushes.
# - This workflow runs on the pushed version tag and publishes to npm.

name: Publish

on:
  push:
    tags:
      - '*.*.*'

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Release
        run: |
          [ -n "$NPM_TOKEN" ] && npm config set //registry.npmjs.org/:_authToken "$NPM_TOKEN"
          npm run release
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
