name: PR Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

jobs:
  validate:
    name: PR Check / Validate
    runs-on: ubuntu-latest

    steps:
      - name: Check out base validator
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.sha }}
          path: base

      - name: Check out event head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          path: head

      - name: Fetch comparison base
        working-directory: head
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BASE_REPOSITORY: ${{ github.repository }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REPOSITORY: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name || github.repository }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if [ "$HEAD_REPOSITORY" = "$BASE_REPOSITORY" ]; then
              git fetch --no-tags origin "$BASE_SHA"
            else
              git fetch --no-tags "https://github.com/$BASE_REPOSITORY.git" "$BASE_SHA"
            fi
          fi

      - name: Collect commit subjects
        working-directory: head
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_AFTER_SHA: ${{ github.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git log --format=%s "$PR_BASE_SHA..$PR_HEAD_SHA" > /tmp/commit-subjects.txt
          elif [ "$PUSH_BEFORE_SHA" = "0000000000000000000000000000000000000000" ]; then
            git log --format=%s --max-count=1 "$PUSH_AFTER_SHA" > /tmp/commit-subjects.txt
          else
            git log --format=%s "$PUSH_BEFORE_SHA..$PUSH_AFTER_SHA" > /tmp/commit-subjects.txt
          fi

      - name: Validate PR title and commit subjects
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node base/scripts/ci/validate-commit-metadata.cjs --commits-file /tmp/commit-subjects.txt

  quality:
    name: PR Check / Quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Check package tarball
        run: npm pack --dry-run
