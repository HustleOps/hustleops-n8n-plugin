name: PR Check

on:
  pull_request:
    types:
      - opened
      - edited
      - reopened
      - synchronize
      - ready_for_review
  push:
    branches:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  quality:
    name: PR Check / Quality
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Check package tarball
        run: npm pack --dry-run

  validate:
    name: PR Check / Validate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Check out base validator
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - name: Check out pull request head
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          path: head

      - name: Fetch base commit
        working-directory: head
        run: |
          if [ "${{ github.event.pull_request.head.repo.full_name }}" = "${{ github.repository }}" ]; then
            git fetch --no-tags origin ${{ github.event.pull_request.base.sha }}
          else
            git fetch --no-tags https://github.com/${{ github.repository }}.git ${{ github.event.pull_request.base.sha }}
          fi

      - name: Collect commit subjects
        working-directory: head
        run: |
          git log --format=%s ${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }} > /tmp/commit-subjects.txt

      - name: Validate PR title and commit subjects
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: node base/scripts/ci/validate-commit-metadata.cjs --commits-file /tmp/commit-subjects.txt
